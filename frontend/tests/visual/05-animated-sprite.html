<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Test 05 — Animated Sprite</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    .info { position: fixed; top: 10px; left: 10px; color: #fff; font: 14px monospace; z-index: 1; }
  </style>
</head>
<body>
  <div class="info" id="info">
    <strong>Test 05: Animated Sprite</strong><br>
    Expected: Three animated units — archer idle, warrior idle, lancer idle.
  </div>
  <canvas id="c"></canvas>
  <script type="module">
    import { Engine } from '../../src/engine/Engine.js';
    import { AnimatedSprite } from '../../src/engine/nodes/AnimatedSprite.js';
    import { SpriteSheet } from '../../src/engine/textures/SpriteSheet.js';

    const engine = await Engine.create(document.getElementById('c'), {
      backgroundColor: 0x1a1a2e,
    });

    const animSprites = [];

    async function addUnit(key, url, frameWidth, x) {
      const tex = await engine.textures.load(key, url);
      const frames = SpriteSheet.fromStrip(tex, frameWidth);
      const sprite = new AnimatedSprite(frames);
      sprite.anchor.set(0.5, 0.5);
      sprite.position.set(x, 0);
      sprite.animationSpeed = 0.12;
      sprite.play();
      engine.stage.addChild(sprite);
      animSprites.push(sprite);
    }

    await addUnit('archer_idle', '../../assets/units/blue/archer_v1/archer_idle.png', 192, -250);
    await addUnit('warrior_idle', '../../assets/units/blue/warrior_v1/warrior_idle.png', 192, 0);
    await addUnit('pawn_idle', '../../assets/units/blue/pawn_v1/pawn_idle.png', 192, 250);

    // AnimatedSprites now auto-register on ticker via play()
  </script>
</body>
</html>
