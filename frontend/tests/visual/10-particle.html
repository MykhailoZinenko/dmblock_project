<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Test 10 — ParticleContainer</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    .info { position: fixed; top: 10px; left: 10px; color: #fff; font: 14px monospace; z-index: 1; }
    #fps { position: fixed; top: 10px; right: 10px; color: #0f0; font: 14px monospace; z-index: 1; }
  </style>
</head>
<body>
  <div class="info">
    <strong>Test 10: ParticleContainer</strong><br>
    1000 particles, instanced rendering
  </div>
  <div id="fps">FPS: --</div>
  <canvas id="c"></canvas>
  <script type="module">
    import { Engine } from '../../src/engine/Engine.js';
    import { ParticleContainer } from '../../src/engine/nodes/ParticleContainer.js';

    const fpsEl = document.getElementById('fps');
    let frames = 0;
    let lastTime = performance.now();
    function updateFps() {
      frames++;
      const now = performance.now();
      if (now - lastTime >= 1000) {
        fpsEl.textContent = `FPS: ${frames}`;
        frames = 0;
        lastTime = now;
      }
      requestAnimationFrame(updateFps);
    }
    requestAnimationFrame(updateFps);

    const engine = await Engine.create(document.getElementById('c'), {
      backgroundColor: 0x1a1a2e,
    });

    const tex = await engine.textures.load('tower', '../../assets/buildings/blue/tower/tower.png');

    const pc = new ParticleContainer();
    engine.stage.addChild(pc);

    const particles = [];
    for (let i = 0; i < 1000; i++) {
      const p = {
        x: (Math.random() - 0.5) * 1600,
        y: (Math.random() - 0.5) * 1200,
        scaleX: 0.3 + Math.random() * 0.4,
        scaleY: 0.3 + Math.random() * 0.4,
        rotation: Math.random() * Math.PI * 2,
        alpha: 0.5 + Math.random() * 0.5,
        tint: Math.floor(Math.random() * 0xFFFFFF),
        texture: tex,
        vr: (Math.random() - 0.5) * 0.02,
      };
      particles.push(p);
      pc.addParticle(p);
    }

    engine.ticker.add((dt) => {
      for (const p of particles) {
        p.rotation += p.vr * dt;
      }
      pc._dirty = true;
    });
  </script>
</body>
</html>
