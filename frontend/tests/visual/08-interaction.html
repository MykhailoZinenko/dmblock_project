<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Test 08 — Interaction</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    .info { position: fixed; top: 10px; left: 10px; color: #fff; font: 14px monospace; z-index: 1; }
    #log { position: fixed; top: 10px; right: 10px; color: #0f0; font: 12px monospace; z-index: 1; max-height: 90vh; overflow-y: auto; background: rgba(0,0,0,0.7); padding: 8px; width: 320px; }
  </style>
</head>
<body>
  <div class="info">
    <strong>Test 08: Interaction</strong><br>
    Click sprites. Hover to change cursor.
  </div>
  <div id="log"></div>
  <canvas id="c"></canvas>
  <script type="module">
    import { Engine } from '../../src/engine/Engine.js';
    import { Sprite } from '../../src/engine/nodes/Sprite.js';

    const logEl = document.getElementById('log');
    function log(msg) {
      const line = document.createElement('div');
      line.textContent = msg;
      logEl.prepend(line);
      if (logEl.children.length > 50) logEl.lastChild.remove();
    }

    const engine = await Engine.create(document.getElementById('c'), {
      backgroundColor: 0x1a1a2e,
    });

    const tex = await engine.textures.load('tower', '../../assets/buildings/blue/tower/tower.png');

    for (let i = 0; i < 3; i++) {
      const s = new Sprite(tex);
      s.position.set(-200 + i * 200, 0);
      s.anchor.set(0.5, 0.5);
      s.interactive = true;
      s.cursor = 'pointer';
      s.name = `Sprite ${i + 1}`;

      s.on('pointertap', (ev) => {
        log(`TAP on ${s.name} at (${ev.worldX.toFixed(0)}, ${ev.worldY.toFixed(0)})`);
      });

      s.on('pointerover', () => {
        log(`OVER ${s.name}`);
      });

      s.on('pointerout', () => {
        log(`OUT ${s.name}`);
      });

      engine.stage.addChild(s);
    }
  </script>
</body>
</html>
