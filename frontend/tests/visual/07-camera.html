<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Test 07 — Camera Pan/Zoom</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    .info { position: fixed; top: 10px; left: 10px; color: #fff; font: 14px monospace; z-index: 1; }
  </style>
</head>
<body>
  <div class="info" id="info">
    <strong>Test 07: Camera</strong><br>
    WASD/Arrows to pan, scroll to zoom.
  </div>
  <canvas id="c"></canvas>
  <script type="module">
    import { Engine } from '../../src/engine/Engine.js';
    import { Sprite } from '../../src/engine/nodes/Sprite.js';

    const engine = await Engine.create(document.getElementById('c'), {
      backgroundColor: 0x1a1a2e,
    });

    const tex = await engine.textures.load('tower', '../../assets/buildings/blue/tower/tower.png');

    for (let x = -5; x <= 5; x++) {
      for (let y = -5; y <= 5; y++) {
        const s = new Sprite(tex);
        s.position.set(x * 200, y * 200);
        s.anchor.set(0.5, 0.5);
        s.scale.set(0.5, 0.5);
        engine.stage.addChild(s);
      }
    }

    const keys = {};
    window.addEventListener('keydown', (e) => { keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    engine.canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      engine.camera.zoom *= e.deltaY > 0 ? 0.9 : 1.1;
      engine.camera.zoom = Math.max(0.1, Math.min(10, engine.camera.zoom));
      engine.camera._dirty = true;
    }, { passive: false });

    const info = document.getElementById('info');
    const speed = 300;
    engine.ticker.add((dt) => {
      let moved = false;
      if (keys['KeyW'] || keys['ArrowUp'])    { engine.camera.position.y -= speed * dt; moved = true; }
      if (keys['KeyS'] || keys['ArrowDown'])  { engine.camera.position.y += speed * dt; moved = true; }
      if (keys['KeyA'] || keys['ArrowLeft'])  { engine.camera.position.x -= speed * dt; moved = true; }
      if (keys['KeyD'] || keys['ArrowRight']) { engine.camera.position.x += speed * dt; moved = true; }
      if (moved) engine.camera._dirty = true;
      info.innerHTML = `<strong>Camera</strong><br>Pos: ${engine.camera.position.x.toFixed(0)}, ${engine.camera.position.y.toFixed(0)}<br>Zoom: ${engine.camera.zoom.toFixed(2)}<br>FPS: ${engine.ticker.fps.toFixed(0)}`;
    });
  </script>
</body>
</html>
