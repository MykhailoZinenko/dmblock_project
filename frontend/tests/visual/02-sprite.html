<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Test 02 — Single Sprite</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    .info { position: fixed; top: 10px; left: 10px; color: #fff; font: 14px monospace; z-index: 1; }
  </style>
</head>
<body>
  <div class="info">
    <strong>Test 02: Single Sprite</strong><br>
    Expected: A tower sprite near screen center, an archer sprite sheet to its right.
  </div>
  <canvas id="c"></canvas>
  <script type="module">
    import { Engine } from '../../src/engine/Engine.js';
    import { Sprite } from '../../src/engine/nodes/Sprite.js';
    import { SpriteSheet } from '../../src/engine/textures/SpriteSheet.js';
    import { AnimatedSprite } from '../../src/engine/nodes/AnimatedSprite.js';

    try {
      const engine = await Engine.create(document.getElementById('c'), {
        backgroundColor: 0x2a2a3e,
      });

      // Single-frame sprite: tower (128×256)
      const towerTex = await engine.textures.load('tower', '../../assets/buildings/blue/tower/tower.png');
      const tower = new Sprite(towerTex);
      tower.anchor.set(0.5, 1.0);
      tower.position.set(0, 100);
      engine.stage.addChild(tower);

      // Animated sprite: archer idle strip (1152×192, 6 frames of 192px)
      const archerTex = await engine.textures.load('archer_idle', '../../assets/units/blue/archer_v1/archer_idle.png');
      const frames = SpriteSheet.fromStrip(archerTex, 192);
      const archer = new AnimatedSprite(frames);
      archer.anchor.set(0.5, 0.5);
      archer.position.set(200, 0);
      archer.animationSpeed = 0.15;
      archer.play();
      engine.stage.addChild(archer);

      document.querySelector('.info').innerHTML += '<br><span style="color:lime">✓ Sprites rendered</span>';
    } catch (e) {
      document.querySelector('.info').innerHTML += `<br><span style="color:red">✗ ${e.message}</span>`;
      console.error(e);
    }
  </script>
</body>
</html>
