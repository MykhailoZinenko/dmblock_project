<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Visual Test 04 — Sprite Batching</title>
  <style>
    body { margin: 0; background: #000; }
    canvas { width: 100vw; height: 100vh; display: block; }
    .info { position: fixed; top: 10px; left: 10px; color: #fff; font: 14px monospace; z-index: 1; }
  </style>
</head>
<body>
  <div class="info" id="info">
    <strong>Test 04: Sprite Batching</strong><br>
    Expected: 500 sprites scattered, all rotating. FPS should be ~60.
  </div>
  <canvas id="c"></canvas>
  <script type="module">
    import { Engine } from '../../src/engine/Engine.js';
    import { Sprite } from '../../src/engine/nodes/Sprite.js';

    const engine = await Engine.create(document.getElementById('c'), {
      backgroundColor: 0x1a1a2e,
    });

    const tex = await engine.textures.load('tower', '../../assets/buildings/blue/tower/tower.png');

    const sprites = [];
    for (let i = 0; i < 500; i++) {
      const s = new Sprite(tex);
      s.position.set((Math.random() - 0.5) * 1200, (Math.random() - 0.5) * 800);
      s.scale.set(0.4, 0.4);
      s.anchor.set(0.5, 0.5);
      engine.stage.addChild(s);
      sprites.push(s);
    }

    const info = document.getElementById('info');
    engine.ticker.add((dt) => {
      for (const s of sprites) s.rotation += dt;
      info.innerHTML = `<strong>Test 04: Sprite Batching</strong><br>500 sprites | FPS: ${engine.ticker.fps.toFixed(1)}`;
    });
  </script>
</body>
</html>
