<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcana Engine — Performance</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #0a0a12;
      color: #e0ddd4;
      font-family: 'Cascadia Code', 'Fira Mono', 'Menlo', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.6;
    }

    #container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header {
      margin-bottom: 36px;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 20px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #c4b5fd;
      letter-spacing: 0.04em;
    }

    header p {
      margin-top: 6px;
      font-size: 12px;
      color: #475569;
    }

    nav {
      margin-bottom: 24px;
      padding: 12px 16px;
      background: #111122;
      border-radius: 4px;
      border: 1px solid #1e293b;
    }

    nav h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }

    nav a {
      display: inline-block;
      margin-right: 12px;
      margin-bottom: 4px;
      color: #818cf8;
      text-decoration: none;
      font-size: 13px;
    }

    nav a:hover {
      color: #c4b5fd;
      text-decoration: underline;
    }

    #output {
      /* Results rendered here */
    }
  </style>
</head>
<body>
  <div id="container">
    <header>
      <h1>Arcana Engine — Performance</h1>
      <p>Open via VS Code Live Server &mdash; benchmarks run on load</p>
    </header>

    <nav>
      <h2>Test Suites</h2>
      <a href="../run.html">Unit Tests</a>
    </nav>

    <div id="output"></div>
  </div>

  <script type="module">
    import { runAll } from './harness.js';
    import './engine.bench.js';

    const outputEl = document.getElementById('output');
    runAll(outputEl);
  </script>
</body>
</html>
