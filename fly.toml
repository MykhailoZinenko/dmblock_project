app = "arcana-arena-server"
primary_region = "fra"

[build]
  dockerfile = "server/Dockerfile"

[env]
  PORT = "3001"
  CHAIN_ID = "11155111"
  # RPC_URL set via fly secrets
  DUEL_MANAGER_ADDRESS = "0x3e7DC4775031bD3CF9d2e97d99BD5F48Be54094B"
  HERO_NFT_ADDRESS = "0x2FB7FA959EbaB2B6786B244a09e99CF72B37f297"
  CARD_NFT_ADDRESS = "0xa4616f3f5b1fa4B8B895727c878C6Cf524e25afD"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Single instance — WebSocket state is in-memory, can't split across machines
[deploy]
  strategy = "immediate"
